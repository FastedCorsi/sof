name: Unreal Builds

on:
  workflow_dispatch:
  push:
    branches: [main, develop]
    paths:
      - "UnrealProject/**"
      - ".github/workflows/unreal.yml"

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Locate Unreal Automation Tool
        id: uat
        shell: pwsh
        run: |
          $candidates = @(
            "${env:ProgramFiles}\Epic Games\UE_5.4\Engine\Build\BatchFiles\RunUAT.bat",
            "${env:ProgramFiles}\Epic Games\UE_5.3\Engine\Build\BatchFiles\RunUAT.bat"
          )
          $uat = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if ($uat) {
            "found=true" >> $env:GITHUB_OUTPUT
            "path=$uat" >> $env:GITHUB_OUTPUT
          } else {
            "found=false" >> $env:GITHUB_OUTPUT
            Write-Host "Unreal Engine not installed on this runner. Use a self-hosted UE5 runner for real builds."
          }

      - name: Build Windows client
        if: steps.uat.outputs.found == 'true'
        shell: pwsh
        run: |
          & "${{ steps.uat.outputs.path }}" BuildCookRun `
            -project="$PWD\UnrealProject\SeaOfFire.uproject" `
            -platform=Win64 `
            -clientconfig=Shipping `
            -build -cook -stage -pak -archive `
            -archivedirectory="$PWD\artifacts\windows"

      - name: Upload Windows artifact
        if: steps.uat.outputs.found == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: sea-of-fire-windows
          path: artifacts/windows

  android:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Locate Unreal Automation Tool
        id: uat
        shell: pwsh
        run: |
          $candidates = @(
            "${env:ProgramFiles}\Epic Games\UE_5.4\Engine\Build\BatchFiles\RunUAT.bat",
            "${env:ProgramFiles}\Epic Games\UE_5.3\Engine\Build\BatchFiles\RunUAT.bat"
          )
          $uat = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if ($uat) {
            "found=true" >> $env:GITHUB_OUTPUT
            "path=$uat" >> $env:GITHUB_OUTPUT
          } else {
            "found=false" >> $env:GITHUB_OUTPUT
            Write-Host "Unreal Engine not installed on this runner. Use a self-hosted UE5 Android runner for real builds."
          }

      - name: Build Android client
        if: steps.uat.outputs.found == 'true'
        shell: pwsh
        run: |
          & "${{ steps.uat.outputs.path }}" BuildCookRun `
            -project="$PWD\UnrealProject\SeaOfFire.uproject" `
            -platform=Android `
            -clientconfig=Shipping `
            -build -cook -stage -pak -archive `
            -archivedirectory="$PWD\artifacts\android"

      - name: Upload Android artifact
        if: steps.uat.outputs.found == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: sea-of-fire-android
          path: artifacts/android

