name: Deploy VPS

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Backend"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Backend/package-lock.json

      - name: Build backend
        working-directory: Backend
        run: |
          npm ci
          npm run build

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          printf 'Host *\n  StrictHostKeyChecking no\n  UserKnownHostsFile /dev/null\n' > ~/.ssh/config

      - name: Upload backend
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH }}
        run: |
          ssh "$VPS_USER@$VPS_HOST" "sudo mkdir -p '$VPS_DEPLOY_PATH' && sudo chown -R '$VPS_USER:$VPS_USER' '$VPS_DEPLOY_PATH'"
          rsync -az --delete -e ssh Backend/package.json Backend/package-lock.json Backend/dist Deploy "$VPS_USER@$VPS_HOST:$VPS_DEPLOY_PATH/"

      - name: Restart backend
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BACKEND_ENV: ${{ secrets.BACKEND_ENV }}
        run: |
          ssh "$VPS_USER@$VPS_HOST" "cd '$VPS_DEPLOY_PATH' && DATABASE_URL='$DATABASE_URL' BACKEND_ENV='$BACKEND_ENV' VPS_DEPLOY_PATH='$VPS_DEPLOY_PATH' bash Deploy/scripts/deploy_backend.sh"
