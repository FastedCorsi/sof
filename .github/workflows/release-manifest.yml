name: Release Manifest

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version
        required: true
        default: 0.1.0
      android_url:
        description: Android artifact URL
        required: false
      windows_url:
        description: Windows artifact URL
        required: false
      mac_url:
        description: Mac artifact URL
        required: false
      backend_url:
        description: Backend URL
        required: true
        default: https://vps-a67953f0.vps.ovh.net
      websocket_url:
        description: WebSocket URL
        required: true
        default: wss://vps-a67953f0.vps.ovh.net/ws

jobs:
  manifest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate manifest
        run: |
          mkdir -p release
          cat > release/manifest.json <<JSON
          {
            "version": "${{ inputs.version }}",
            "androidUrl": "${{ inputs.android_url }}",
            "windowsUrl": "${{ inputs.windows_url }}",
            "macUrl": "${{ inputs.mac_url }}",
            "backendUrl": "${{ inputs.backend_url }}",
            "websocketUrl": "${{ inputs.websocket_url }}",
            "sha256": "$(find . -type f -not -path './.git/*' -print0 | sort -z | xargs -0 sha256sum | sha256sum | awk '{print $1}')"
          }
          JSON

      - name: Upload manifest
        uses: actions/upload-artifact@v4
        with:
          name: release-manifest
          path: release/manifest.json

